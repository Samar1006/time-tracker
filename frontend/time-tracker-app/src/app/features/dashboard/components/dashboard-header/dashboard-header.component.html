<header class="dashboard-header">
  <div class="dashboard-header__brand">
    <img src="assets/auth/stopwatch-icon.png" alt="" width="36" height="36" aria-hidden="true" />
    <span class="dashboard-header__title">Time Tracker</span>
  </div>

  <div class="dashboard-header__date-nav">
    <button type="button" class="dashboard-header__nav-btn" aria-label="Previous day" (click)="prevDay.emit()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>
    <div class="dashboard-header__date">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
      {{ displayDate() }}
    </div>
    <button type="button" class="dashboard-header__nav-btn" aria-label="Next day" (click)="nextDay.emit()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </button>
  </div>

  <div class="dashboard-header__actions">
    <button type="button" class="dashboard-header__icon-btn" aria-label="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
    </button>
    <button type="button" class="dashboard-header__avatar" (click)="logout()" [attr.aria-label]="'Account menu for ' + user()?.displayName">
      {{ initials() }}
    </button>
  </div>
</header>
