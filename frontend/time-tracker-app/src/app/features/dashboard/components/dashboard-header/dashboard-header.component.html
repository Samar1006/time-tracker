<header class="dashboard-header">
  <div class="dashboard-header__brand">
    <img src="assets/auth/logo.png" alt="" width="48" height="32" aria-hidden="true" />
    <span class="dashboard-header__title">Focusify</span>
  </div>

  <div class="dashboard-header__actions">
    <a routerLink="/settings" class="dashboard-header__icon-btn" aria-label="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3" />
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
    </a>
    <button
      type="button"
      class="dashboard-header__icon-btn"
      [attr.aria-label]="theme.dark() ? 'Switch to light mode' : 'Switch to dark mode'"
      [title]="theme.dark() ? 'Light mode' : 'Dark mode'"
      (click)="toggleTheme()"
    >
      @if (theme.dark()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5" />
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      }
    </button>
    <button type="button" class="dashboard-header__avatar" (click)="logout()" [attr.aria-label]="'Account menu for ' + user()?.displayName">
      {{ initials() }}
    </button>
  </div>
</header>
