<app-shell [userId]="userId()">
  @if (loading()) {
    <p class="dashboard-status">Loading timeline…</p>
  } @else if (error()) {
    <p class="dashboard-status dashboard-status--error">{{ error() }}</p>
  } @else {
    <section class="dashboard-stats">
      <app-stat-card label="Total tracked" [value]="stats().totalTracked" icon="clock" />
      <app-stat-card
        label="Most active"
        [value]="stats().mostActiveCategory + ' · ' + stats().mostActiveDuration"
        icon="chart"
      />
      <app-stat-card label="Top app" [value]="stats().topApp" icon="star" />
    </section>

    <div class="dashboard-timeline-wrap">
      <app-timeline-chart
        [hours]="dayHours()"
        [date]="selectedDate()"
        [timezone]="timeline()?.timezone ?? 'UTC'"
        (prevDay)="previousDay()"
        (nextDay)="nextDay()"
        (selectDate)="selectDate($event)"
      />

      <button
        type="button"
        class="dashboard-voice-btn"
        [class.dashboard-voice-btn--recording]="voiceLog.recording()"
        [disabled]="voiceLog.busy()"
        (click)="onVoiceLog()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
        @if (voiceLog.busy()) {
          Processing…
        } @else if (voiceLog.recording()) {
          Stop
        } @else {
          Log with voice
        }
      </button>
      @if (lastHeard()) {
        <p class="dashboard-voice-heard">Heard: “{{ lastHeard() }}”</p>
      }
      @if (voiceError()) {
        <p class="dashboard-voice-heard dashboard-voice-error">{{ voiceError() }}</p>
      }
    </div>
  }
</app-shell>
