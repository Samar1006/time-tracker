<div class="day-date-nav">
  <button
    type="button"
    class="day-date-nav__btn day-date-nav__btn--prev"
    aria-label="Previous day"
    (click)="prevDay.emit()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="15 18 9 12 15 6" />
    </svg>
  </button>

  <div class="day-date-nav__title-wrap">
    <button
      type="button"
      class="day-date-nav__title-picker"
      [attr.aria-expanded]="calendarOpen()"
      aria-haspopup="dialog"
      (click)="toggleCalendar($event)"
    >
      <span class="day-date-nav__title">{{ displayTitle() }}</span>
    </button>

    @if (calendarOpen()) {
      <div
        class="day-date-nav__calendar-popup"
        role="dialog"
        aria-label="Choose date"
        (click)="$event.stopPropagation()"
      >
        <header class="day-date-nav__calendar-head">
          <button
            type="button"
            class="day-date-nav__calendar-nav"
            aria-label="Previous month"
            (click)="previousPopupMonth($event)"
          >
            ‹
          </button>
          <span class="day-date-nav__calendar-month">{{ popupMonthLabel() }}</span>
          <button
            type="button"
            class="day-date-nav__calendar-nav"
            aria-label="Next month"
            (click)="nextPopupMonth($event)"
          >
            ›
          </button>
        </header>

        <div class="day-date-nav__calendar-weekdays" aria-hidden="true">
          @for (label of popupWeekdays; track $index) {
            <span class="day-date-nav__calendar-weekday">{{ label }}</span>
          }
        </div>

        <div class="day-date-nav__calendar-grid">
          @for (cell of popupCells(); track $index) {
            @if (cell.date) {
              <button
                type="button"
                class="day-date-nav__calendar-day"
                [class.day-date-nav__calendar-day--selected]="cell.isSelected"
                [class.day-date-nav__calendar-day--today]="cell.isToday"
                (click)="onDatePick(cell.date)"
              >
                {{ cell.day }}
              </button>
            } @else {
              <span class="day-date-nav__calendar-day day-date-nav__calendar-day--empty" aria-hidden="true"></span>
            }
          }
        </div>
      </div>
    }
  </div>

  <button
    type="button"
    class="day-date-nav__btn day-date-nav__btn--next"
    aria-label="Next day"
    (click)="nextDay.emit()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="9 18 15 12 9 6" />
    </svg>
  </button>
</div>

@if (showTodayButton() && !isToday()) {
  <button type="button" class="day-date-nav__today" (click)="goToToday($event)">Today</button>
}
