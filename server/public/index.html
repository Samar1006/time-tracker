<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Time Tracker — Voice Schedule</title>
<style>
  :root {
    --bg: #0f1220; --card: #1a1f33; --line: #2a3048; --text: #e7ebf5;
    --muted: #9aa3bd; --accent: #6c8cff;
    --work: #6c8cff; --communication: #f0a35e; --learning: #4cc4a3;
    --entertainment: #d96cc0; --break: #7bd16c; --uncategorized: #8893ad;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); padding: 28px 16px 48px;
  }
  .wrap { max-width: 640px; margin: 0 auto; display: grid; gap: 16px; }
  textarea {
    width: 100%; min-height: 88px; resize: vertical; padding: 12px 14px;
    background: var(--card); color: var(--text); border: 1px solid var(--line);
    border-radius: 12px; font: inherit;
  }
  button {
    background: var(--accent); color: #fff; border: 0; padding: 12px 20px;
    border-radius: 12px; font: inherit; font-weight: 600; cursor: pointer;
    width: fit-content;
  }
  button.recording { background: #3a2230; color: #ff8b8b; border: 1px solid #5c3040; }
  .heard {
    color: var(--muted); font-size: 14px; min-height: 1.4em; padding: 0 2px;
  }
  .heard strong { color: var(--text); font-weight: 500; }
  .day-group { display: grid; gap: 8px; }
  .day-head {
    color: var(--muted); font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; margin-top: 8px;
  }
  .blocks { display: grid; gap: 8px; }
  .block {
    display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
    background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--accent);
    border-radius: 12px; padding: 12px 14px;
  }
  .block-main { display: grid; gap: 4px; }
  .time { font-variant-numeric: tabular-nums; font-weight: 600; }
  .dur { color: var(--muted); font-size: 13px; font-weight: 400; }
  .activity { color: var(--text); }
  .cat {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 4px 10px; border-radius: 999px; white-space: nowrap;
  }
  .empty { color: var(--muted); font-size: 14px; }
  .err { color: #ff8b8b; }
</style>
</head>
<body>
<div class="wrap">
  <button id="record">🎤 Record</button>
  <textarea id="transcript" placeholder="Or type an activity and press Enter…"></textarea>
  <p id="heard" class="heard"></p>
  <div id="schedule"></div>
  <p id="empty" class="empty">Your schedule will appear here.</p>
</div>

<script>
  const CAT_COLORS = {
    work: "var(--work)", communication: "var(--communication)", learning: "var(--learning)",
    entertainment: "var(--entertainment)", break: "var(--break)", uncategorized: "var(--uncategorized)",
  };

  const $ = (id) => document.getElementById(id);
  const ta = $("transcript"), scheduleEl = $("schedule"), empty = $("empty"), heard = $("heard");
  const recordBtn = $("record");
  let scheduleBlocks = [];
  let lastHeard = "";

  function parseTimeSortKey(label) {
    if (!label) return null;
    const m = label.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!m) return null;
    let h = parseInt(m[1], 10);
    const min = parseInt(m[2], 10);
    if (m[3].toUpperCase() === "PM" && h < 12) h += 12;
    if (m[3].toUpperCase() === "AM" && h === 12) h = 0;
    return h * 60 + min;
  }

  function sortBlocks(blocks) {
    return [...blocks].sort((a, b) => {
      if (a.date !== b.date) return (a.date || "").localeCompare(b.date || "");
      const am = parseTimeSortKey(a.start);
      const bm = parseTimeSortKey(b.start);
      if (am == null && bm == null) return 0;
      if (am == null) return 1;
      if (bm == null) return -1;
      return am - bm;
    });
  }

  function formatDayHeading(dateISO, dayLabel) {
    const d = new Date(`${dateISO}T12:00:00.000Z`);
    const formatted = d.toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
    if (dayLabel === "today" || dayLabel === "tomorrow" || dayLabel === "yesterday") {
      return `${dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1)} · ${formatted}`;
    }
    return formatted;
  }

  function setHeard(text, isErr = false) {
    heard.className = isErr ? "heard err" : "heard";
    if (!text) { heard.textContent = ""; return; }
    heard.innerHTML = `Heard: <strong>${escapeHtml(text)}</strong>`;
  }

  async function addTranscript(transcript, heardText) {
    const text = transcript.trim();
    if (!text) return;
    empty.textContent = "Parsing…";
    try {
      const res = await fetch("/api/schedule/parse", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ transcript: text, referenceDate: new Date().toISOString() }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      const newBlocks = data.blocks || [];
      if (!newBlocks.length) {
        empty.textContent = "No activities found — try adding times.";
        return;
      }
      scheduleBlocks = sortBlocks([...scheduleBlocks, ...newBlocks]);
      lastHeard = heardText || text;
      setHeard(lastHeard);
      render(scheduleBlocks);
      ta.value = "";
      empty.textContent = "";
    } catch (e) {
      empty.className = "empty err";
      empty.textContent = "Error: " + e.message;
    }
  }

  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      addTranscript(ta.value, ta.value.trim());
    }
  });

  let recorder = null, chunks = [];
  recordBtn.onclick = async () => {
    if (recorder && recorder.state === "recording") { recorder.stop(); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recorder = new MediaRecorder(stream);
      chunks = [];
      recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
      recorder.onstop = () => transcribe(new Blob(chunks, { type: recorder.mimeType }));
      recorder.start();
      recordBtn.textContent = "⏹ Stop";
      recordBtn.classList.add("recording");
      setHeard("Listening…");
    } catch (e) {
      setHeard("Mic unavailable: " + e.message, true);
    }
  };

  async function transcribe(blob) {
    recordBtn.textContent = "🎤 Record";
    recordBtn.classList.remove("recording");
    setHeard("Transcribing…");
    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch("/api/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ audioBase64 }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Transcription failed");
      const transcript = (data.transcript || "").trim();
      if (!transcript) { setHeard("Heard nothing — try again.", true); return; }
      ta.value = transcript;
      await addTranscript(transcript, transcript);
    } catch (e) {
      setHeard("Error: " + e.message, true);
    }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onloadend = () => resolve(String(r.result).split(",")[1]);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  }

  function render(blocks) {
    if (!blocks.length) {
      scheduleEl.innerHTML = "";
      empty.textContent = "Your schedule will appear here.";
      return;
    }
    empty.textContent = "";
    const byDate = new Map();
    for (const b of blocks) {
      const key = b.date || "unknown";
      if (!byDate.has(key)) byDate.set(key, []);
      byDate.get(key).push(b);
    }
    scheduleEl.innerHTML = [...byDate.entries()].map(([date, dayBlocks]) => {
      const label = formatDayHeading(date, dayBlocks[0]?.dayLabel);
      const rows = dayBlocks.map((b) => {
        const color = CAT_COLORS[b.category] || CAT_COLORS.uncategorized;
        const timeRange = b.start && b.end
          ? `${b.start} – ${b.end}${b.endDate && b.endDate !== b.date ? " (next day)" : ""}`
          : b.start || b.end || "—";
        const dur = b.durationMin ? `${b.durationMin} min` : "";
        return `<div class="block" style="border-left-color:${color}">
          <div class="block-main">
            <div class="time">${escapeHtml(timeRange)}${dur ? `<span class="dur"> · ${dur}</span>` : ""}</div>
            <div class="activity">${escapeHtml(b.activity)}</div>
          </div>
          <div class="cat" style="background:${color}22;color:${color}">${b.category}</div>
        </div>`;
      }).join("");
      return `<section class="day-group"><div class="day-head">${escapeHtml(label)}</div><div class="blocks">${rows}</div></section>`;
    }).join("");
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
