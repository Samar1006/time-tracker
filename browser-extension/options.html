<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Time Tracker Monitor — Options</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e1b4b;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
        font-size: 0.875rem;
      }
      input[type='text'],
      input[type='email'],
      input[type='password'],
      input[type='url'] {
        width: 100%;
        margin-top: 0.375rem;
        padding: 0.625rem 0.75rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .hint {
        margin-top: 0.375rem;
        font-size: 0.8125rem;
        color: #6b7280;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.625rem 1.25rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #059669;
      }
      #status.error {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>Background Monitor</h1>
    <p>
      Log in with your time-tracker account, or open the dashboard at
      <code>:4200</code> while logged in — the extension syncs your session automatically.
    </p>

    <label>
      <input type="checkbox" id="enabled" checked />
      Enable tracking
    </label>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="demo@timetracker.test" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Demo1234!" />

    <label for="apiBaseUrl">API base URL</label>
    <input id="apiBaseUrl" type="url" value="http://localhost:4000" />
    <p class="hint">Use <code>http://&lt;LAN-IP&gt;:4000</code> when testing from another machine on the same Wi‑Fi.</p>

    <button type="button" id="login">Log in &amp; save</button>
    <p id="status" hidden></p>

    <script src="options.js"></script>
  </body>
</html>
