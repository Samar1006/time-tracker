<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Time Tracker Monitor — Options</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e1b4b;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
        font-size: 0.875rem;
      }
      input[type='text'],
      input[type='url'] {
        width: 100%;
        margin-top: 0.375rem;
        padding: 0.625rem 0.75rem;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .hint {
        margin-top: 0.375rem;
        font-size: 0.8125rem;
        color: #6b7280;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.625rem 1.25rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #059669;
      }
    </style>
  </head>
  <body>
    <h1>Background Monitor</h1>
    <p>Connect this extension to your time-tracker account. Use the user ID from your dashboard session (or <code>user-demo-1</code> for the demo account).</p>

    <label>
      <input type="checkbox" id="enabled" checked />
      Enable tracking
    </label>

    <label for="userId">User ID</label>
    <input id="userId" type="text" placeholder="user-demo-1" />
    <p class="hint">Must match the logged-in account's ID for timeline data to appear on your dashboard.</p>

    <label for="apiBaseUrl">API base URL</label>
    <input id="apiBaseUrl" type="url" value="http://localhost:4000" />

    <button type="button" id="save">Save</button>
    <p id="status" hidden>Saved.</p>

    <script src="options.js"></script>
  </body>
</html>
